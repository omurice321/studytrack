<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>StudyTrack</title>
<style>
  :root {
    --bg:           #F5F0E8;
    --surface:      #EDE5D0;
    --surface2:     #E4D9C0;
    --border:       #C8B89A;
    --text:         #3D2B1F;
    --muted:        #7A6652;
    --accent:       #A0522D;
    --accent-light: #D4956A;
    --success:      #5C7A4E;
    --danger:       #8B3A3A;
    --safe-top:     env(safe-area-inset-top, 0px);
    --safe-bottom:  env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  #header {
    padding: calc(var(--safe-top) + 12px) 20px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);

  }
  #header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  #app-title {
    font-family: Georgia, serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--accent);
    font-weight: 600;
  }
  #header-date {
    font-size: 13px;
    color: var(--muted);
  }
  #date-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #date-nav button {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 16px;
    color: var(--accent);
    cursor: pointer;
    line-height: 1;
  }
  #selected-date-label {
    font-family: Georgia, serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    min-width: 160px;
    text-align: center;
  }
  #date-input-wrap { display: none; }
  #date-input {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 8px;
    padding: 4px 8px;
    color: var(--text);
    font-size: 14px;
  }

  /* ── SCROLL CONTENT ── */
  #content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px 8px;
  }

  /* ── BOTTOM NAV ── */
  #bottom-nav {

    display: flex;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding-bottom: var(--safe-bottom);
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 0;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--muted);
    font-size: 10px;
    gap: 4px;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* ── TAB PANELS ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── SECTION HEADING ── */
  .section-title {
    font-family: Georgia, serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .section-sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* ── TODAY CARDS ── */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
    position: relative;
  }
  .task-card-left-bar {
    position: absolute;
    left: 0; top: 12px; bottom: 12px;
    width: 4px;
    border-radius: 4px;
    background: var(--accent-light);
  }
  .task-card-left-bar.done { background: var(--success); }
  .task-card-inner { padding-left: 10px; }
  .task-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .task-card-name {
    font-family: Georgia, serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
  }
  .check-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    font-size: 18px;

    transition: all 0.2s;
    margin-left: 8px;
    margin-top: -2px;
  }
  .check-btn.checked {
    background: var(--success);
    border-color: var(--success);
    color: white;
  }
  .task-goal-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
  }
  .task-actual-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }
  .actual-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .actual-input {
    width: 70px;
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: 8px;
    padding: 5px 8px;
    font-size: 15px;
    color: var(--text);
    text-align: right;
  }
  .actual-unit { font-size: 12px; color: var(--muted); }
  .delta-badge {
    margin-left: auto;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
  }
  .delta-badge.over { background: #d4edd4; color: var(--success); }
  .delta-badge.under { background: #edd4d4; color: var(--danger); }
  .delta-badge.exact { background: var(--surface2); color: var(--accent); }

  /* ── STREAK ── */
  .streak-label {
    font-size: 11px;
    color: var(--accent);
    margin-top: 6px;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }
  .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ── PROGRESS TAB ── */
  #progress-scroll {
    display: flex;
    gap: 12px;
    flex-direction: column;

    -webkit-overflow-scrolling: touch;
    padding-bottom: 8px;

  }

  .progress-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;


  }
  .progress-card-title {
    font-family: Georgia, serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
    text-align: center;
  }
  .chart-wrap {
    position: relative;
    width: 160px;
    height: 160px;
    margin: 0 auto 12px;
  }
  .chart-wrap svg { width: 100%; height: 100%; }
  .chart-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .chart-center-value {
    font-family: Georgia, serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .chart-center-unit {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .chart-center-pct {
    font-size: 11px;
    color: var(--accent);
    margin-top: 3px;
    font-weight: 600;
  }
  .progress-meta { font-size: 11px; color: var(--muted); line-height: 1.8; }
  .progress-meta strong { color: var(--text); }

  /* ── LEGEND ── */
  .legend-row {
    display: flex;
    gap: 12px;
    flex-direction: column;
    justify-content: center;
    margin-bottom: 10px;
    font-size: 10px;
    color: var(--muted);
  }
  .legend-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }

  /* ── ALL TASKS TAB ── */
  .all-tasks-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .add-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .task-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
    flex-direction: column;
    align-items: flex-start;
  }
  .task-row-main { flex: 1; min-width: 0; }
  .task-row-name {
    font-family: Georgia, serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
  }
  .task-row-meta { font-size: 11px; color: var(--muted); line-height: 1.7; }
  .status-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    white-space: nowrap;
    align-self: flex-start;

  }
  .badge-upcoming  { background: #e8e0cc; color: var(--muted); }
  .badge-active    { background: #f0dfc8; color: var(--accent); }
  .badge-done      { background: #d4edd4; color: var(--success); }
  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    align-self: flex-start;

    line-height: 1;
  }
  .completion-bar-wrap {
    height: 4px;
    background: var(--surface2);
    border-radius: 4px;
    margin-top: 6px;
    overflow: hidden;
  }
  .completion-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--accent);
    transition: width 0.4s;
  }

  /* ── MODAL ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30,18,8,0.55);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: var(--bg);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(var(--safe-bottom) + 20px);
    width: 100%;
    max-width: 500px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  #modal h2 {
    font-family: Georgia, serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
  }
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 5px;
  }
  .form-input {
    width: 100%;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 15px;
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }
  .btn-cancel {
    flex: 1;
    padding: 13px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 12px;
    font-size: 15px;
    color: var(--muted);
    cursor: pointer;
  }
  .btn-save {
    flex: 2;
    padding: 13px;
    border: none;
    background: var(--accent);
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    color: white;
    cursor: pointer;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 80px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: var(--bg);
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 200;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-top">
    <span id="app-title">STUDYTRACK</span>
    <span id="header-date"></span>
  </div>
  <div id="date-nav">
    <button id="prev-day-btn">‹</button>
    <span id="selected-date-label"></span>
    <button id="next-day-btn">›</button>
  </div>
</div>

<!-- CONTENT -->
<div id="content">
  <!-- TODAY -->
  <div id="tab-today" class="tab-panel active">
    <p class="section-title">今日のタスク</p>
    <p class="section-sub" id="today-sub"></p>
    <div id="today-list"></div>
  </div>

  <!-- PROGRESS -->
  <div id="tab-progress" class="tab-panel">
    <p class="section-title">進捗</p>
    <p class="section-sub">内側：経過日数　外側：累計実績</p>
    <div class="legend-row">
      <span><span class="legend-dot" style="background:#A0522D"></span>経過日数</span>
      <span><span class="legend-dot" style="background:#5C7A4E"></span>累計達成</span>
      <span><span class="legend-dot" style="background:#8B3A3A"></span>遅れ気味</span>
    </div>
    <div id="progress-scroll"></div>
  </div>

  <!-- ALL TASKS -->
  <div id="tab-all" class="tab-panel">
    <div class="all-tasks-header">
      <p class="section-title">全タスク</p>
      <button class="add-btn" id="open-modal-btn">＋ 追加</button>
    </div>
    <div id="all-tasks-list"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav id="bottom-nav">
  <button class="nav-btn active" data-tab="today">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    今日
  </button>
  <button class="nav-btn" data-tab="progress">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
    </svg>
    進捗
  </button>
  <button class="nav-btn" data-tab="all">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
      <circle cx="3.5" cy="6" r="1.2" fill="currentColor"/><circle cx="3.5" cy="12" r="1.2" fill="currentColor"/><circle cx="3.5" cy="18" r="1.2" fill="currentColor"/>
    </svg>
    全体
  </button>
</nav>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h2>タスクを追加</h2>
    <div class="form-group">
      <label class="form-label">タスク名</label>
      <input class="form-input" id="f-name" type="text" placeholder="例：SPI勉強">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">開始日</label>
        <input class="form-input" id="f-start" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">締切</label>
        <input class="form-input" id="f-end" type="date">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">1日の目標</label>
        <input class="form-input" id="f-goal" type="number" min="0" step="0.5" placeholder="20">
      </div>
      <div class="form-group">
        <label class="form-label">単位</label>
        <input class="form-input" id="f-unit" type="text" placeholder="問 / 時間 / ページ">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="close-modal-btn">キャンセル</button>
      <button class="btn-save" id="save-task-btn">保存</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ─── UTILS ───────────────────────────────────────────────
function isoToday() {
  const d = new Date();
  return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
}
function isoToJa(iso) {
  const [y,m,d] = iso.split('-');
  const days = ['日','月','火','水','木','金','土'];
  const dow = new Date(iso).getDay();
  return `${y}年${parseInt(m)}月${parseInt(d)}日（${days[dow]}）`;
}
function isoToShort(iso) {
  const [,m,d] = iso.split('-');
  return `${parseInt(m)}/${parseInt(d)}`;
}
function addDays(iso, n) {
  const d = new Date(iso);
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0,10);
}
function diffDays(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}
function uid() {
  return Math.random().toString(36).slice(2,10);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ─── STATE ───────────────────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('st_tasks') || '[]');
let logs  = JSON.parse(localStorage.getItem('st_logs')  || '[]');
let selectedDate = isoToday();
let currentTab = 'today';

function saveTasks() { localStorage.setItem('st_tasks', JSON.stringify(tasks)); }
function saveLogs()  { localStorage.setItem('st_logs',  JSON.stringify(logs)); }

function getLog(taskId, date) {
  return logs.find(l => l.taskId === taskId && l.date === date) || null;
}
function upsertLog(taskId, date, patch) {
  let log = logs.find(l => l.taskId === taskId && l.date === date);
  if (!log) {
    const task = tasks.find(t => t.id === taskId);
    log = { id: uid(), taskId, date, goalValue: task.goalValue, actualValue: 0, checked: false };
    logs.push(log);
  }
  Object.assign(log, patch);
  saveLogs();
}
function totalActual(taskId) {
  return logs.filter(l => l.taskId === taskId).reduce((s,l) => s + (l.actualValue||0), 0);
}
function streak(taskId) {
  let count = 0;
  let d = isoToday();
  while (true) {
    const l = getLog(taskId, d);
    if (l && l.checked) { count++; d = addDays(d, -1); }
    else break;
  }
  return count;
}

// ─── HEADER ──────────────────────────────────────────────
function renderHeader() {
  document.getElementById('header-date').textContent =
    new Date().toLocaleDateString('ja-JP', {month:'numeric', day:'numeric', weekday:'short'});
  document.getElementById('selected-date-label').textContent = isoToJa(selectedDate);
}

// ─── TODAY TAB ───────────────────────────────────────────
function renderToday() {
  const list = document.getElementById('today-list');
  const sub  = document.getElementById('today-sub');
  const active = tasks.filter(t => t.startDate <= selectedDate && t.endDate >= selectedDate);

  sub.textContent = ``;

  if (!active.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="emoji">📖</div>
        <p>この日のタスクはありません<br><span style="font-size:12px;color:var(--muted)">「全体」タブからタスクを追加できます</span></p>
      </div>`;
    return;
  }

  list.innerHTML = active.map(task => {
    const log = getLog(task.id, selectedDate);
    const actual = log ? log.actualValue : 0;
    const checked = log ? log.checked : false;
    const delta = actual - task.goalValue;
    let deltaBadge = '';
    if (actual > 0 || log) {
      if (delta > 0) deltaBadge = `<span class="delta-badge over">+${delta}${task.goalUnit}</span>`;
      else if (delta < 0) deltaBadge = `<span class="delta-badge under">${delta}${task.goalUnit}</span>`;
      else deltaBadge = `<span class="delta-badge exact">ちょうど！</span>`;
    }
    const s = streak(task.id);
    const streakHtml = s >= 2 ? `<div class="streak-label">🔥 ${s}日連続達成中</div>` : '';
    return `
      <div class="task-card" id="card-${task.id}">
        <div class="task-card-left-bar ${checked ? 'done' : ''}" id="bar-${task.id}"></div>
        <div class="task-card-inner">
          <div class="task-card-header">
            <div class="task-card-name">${task.name}</div>
            <button class="check-btn ${checked ? 'checked' : ''}" data-id="${task.id}" onclick="toggleCheck('${task.id}')">✓</button>
          </div>
          <div class="task-goal-label">目標：${task.goalValue}${task.goalUnit}/日</div>
          <div class="task-actual-row">
            <span class="actual-label">実績</span>
            <input class="actual-input" type="number" min="0" step="${task.goalUnit==='時間'?'0.5':'1'}"
              value="${actual||''}" placeholder="0"
              onchange="updateActual('${task.id}', this.value)">
            <span class="actual-unit">${task.goalUnit}</span>
            ${deltaBadge}
          </div>
          ${streakHtml}
        </div>
      </div>`;
  }).join('');
}

function toggleCheck(taskId) {
  const log = getLog(taskId, selectedDate);
  const nowChecked = log ? !log.checked : true;
  upsertLog(taskId, selectedDate, { checked: nowChecked });
  renderToday();
  showToast(nowChecked ? '✓ 完了！' : '未完了に戻しました');
}

function updateActual(taskId, val) {
  const v = parseFloat(val) || 0;
  upsertLog(taskId, selectedDate, { actualValue: v });
  renderToday();
}

// ─── PROGRESS TAB ────────────────────────────────────────
function renderProgress() {
  const wrap = document.getElementById('progress-scroll');
  if (!tasks.length) {
    wrap.innerHTML = `<div class="empty-state" style="width:100%"><div class="emoji">📊</div><p>タスクがまだありません</p></div>`;
    return;
  }

  wrap.innerHTML = tasks.map(task => {
    const today = isoToday();
    const totalDays = diffDays(task.startDate, task.endDate) + 1;
    const elapsedRaw = diffDays(task.startDate, today) + 1;
    const elapsed = Math.max(0, Math.min(elapsedRaw, totalDays));
    const remaining = Math.max(0, diffDays(today, task.endDate));
    const totalGoal = task.goalValue * totalDays;
    const actual = totalActual(task.id);

    const timePct  = totalDays > 0 ? elapsed / totalDays : 0;
    const achPct   = totalGoal > 0 ? Math.min(actual / totalGoal, 1) : 0;
    const onTrack  = achPct >= timePct * 0.9;
    const achColor = onTrack ? '#5C7A4E' : '#8B3A3A';

    const r = 66; const cx = 80; const cy = 80;
    const r2 = 50;
    const circ  = 2 * Math.PI * r;
    const circ2 = 2 * Math.PI * r2;

    const dashOuter = achPct  * circ;
    const dashInner = timePct * circ2;

    const displayVal = task.goalUnit === '時間'
      ? actual.toFixed(1)
      : Math.round(actual);
    const displayGoal = task.goalUnit === '時間'
      ? totalGoal.toFixed(0)
      : totalGoal;

    return `
      <div class="progress-card">
        <div class="progress-card-title">${task.name}</div>
        <div class="chart-wrap">
          <svg viewBox="0 0 160 160">
            <!-- outer track -->
            <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#E4D9C0" stroke-width="12"/>
            <!-- outer fill (achievement) -->
            <circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
              stroke="${achColor}" stroke-width="12"
              stroke-dasharray="${dashOuter} ${circ}"
              stroke-dashoffset="${circ * 0.25}"
              stroke-linecap="round"
              transform="rotate(-90 ${cx} ${cy})"/>
            <!-- inner track -->
            <circle cx="${cx}" cy="${cy}" r="${r2}" fill="none" stroke="#E4D9C0" stroke-width="10"/>
            <!-- inner fill (time) -->
            <circle cx="${cx}" cy="${cy}" r="${r2}" fill="none"
              stroke="#A0522D" stroke-width="10"
              stroke-dasharray="${dashInner} ${circ2}"
              stroke-dashoffset="0"
              stroke-linecap="round"
              transform="rotate(-90 ${cx} ${cy})"/>
          </svg>
          <div class="chart-center">
            <div class="chart-center-value">${displayVal}</div>
            <div class="chart-center-unit">${task.goalUnit}</div>
            <div class="chart-center-pct">${Math.round(achPct*100)}%</div>
          </div>
        </div>
        <div class="progress-meta">
          <div>期間：${isoToShort(task.startDate)} 〜 ${isoToShort(task.endDate)}</div>
          <div>残り <strong>${remaining}日</strong>（全${totalDays}日）</div>
          <div>累計 <strong>${displayVal} / ${displayGoal}${task.goalUnit}</strong></div>
          <div>日標 <strong>${task.goalValue}${task.goalUnit}/日</strong></div>
        </div>
      </div>`;
  }).join('');
}

// ─── ALL TASKS TAB ───────────────────────────────────────
function renderAll() {
  const list = document.getElementById('all-tasks-list');
  const today = isoToday();
  if (!tasks.length) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">＋</div><p>まだタスクがありません<br>右上のボタンから追加しましょう</p></div>`;
    return;
  }
  const sorted = [...tasks].sort((a,b) => a.startDate.localeCompare(b.startDate));
  list.innerHTML = sorted.map(task => {
    let status, badgeClass;
    if (today < task.startDate)     { status = '予定'; badgeClass = 'badge-upcoming'; }
    else if (today <= task.endDate) { status = '進行中'; badgeClass = 'badge-active'; }
    else                            { status = '完了'; badgeClass = 'badge-done'; }

    const totalDays = diffDays(task.startDate, task.endDate) + 1;
    const totalGoal = task.goalValue * totalDays;
    const actual = totalActual(task.id);
    const pct = totalGoal > 0 ? Math.min(Math.round(actual/totalGoal*100), 100) : 0;
    const displayGoal = task.goalUnit === '時間' ? totalGoal.toFixed(0) : totalGoal;
    const displayAct  = task.goalUnit === '時間' ? actual.toFixed(1) : Math.round(actual);

    return `
      <div class="task-row">
        <div class="task-row-main">
          <div class="task-row-name">${task.name}</div>
          <div class="task-row-meta">
            ${isoToShort(task.startDate)} 〜 ${isoToShort(task.endDate)}　${task.goalValue}${task.goalUnit}/日　計${displayGoal}${task.goalUnit}<br>
            実績 ${displayAct}${task.goalUnit}（${pct}%）
          </div>
          <div class="completion-bar-wrap">
            <div class="completion-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>
        <span class="status-badge ${badgeClass}">${status}</span>
        <button class="delete-btn" onclick="deleteTask('${task.id}')">✕</button>
      </div>`;
  }).join('');
}

function deleteTask(id) {
  if (!confirm('このタスクを削除しますか？')) return;
  tasks = tasks.filter(t => t.id !== id);
  logs  = logs.filter(l => l.taskId !== id);
  saveTasks(); saveLogs();
  renderAll(); renderProgress();
  showToast('タスクを削除しました');
}

// ─── MODAL ───────────────────────────────────────────────
document.getElementById('open-modal-btn').onclick = () => {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('f-start').value = isoToday();
};
document.getElementById('close-modal-btn').onclick = closeModal;
document.getElementById('modal-overlay').onclick = e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
};
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  ['f-name','f-start','f-end','f-goal','f-unit'].forEach(id => document.getElementById(id).value = '');
}
document.getElementById('save-task-btn').onclick = () => {
  const name  = document.getElementById('f-name').value.trim();
  const start = document.getElementById('f-start').value;
  const end   = document.getElementById('f-end').value;
  const goal  = parseFloat(document.getElementById('f-goal').value);
  const unit  = document.getElementById('f-unit').value.trim();
  if (!name || !start || !end || !goal || !unit) { showToast('すべて入力してください'); return; }
  if (start > end) { showToast('開始日が締切より後になっています'); return; }
  tasks.push({ id: uid(), name, startDate: start, endDate: end, goalValue: goal, goalUnit: unit });
  saveTasks();
  closeModal();
  renderAll(); renderProgress(); renderToday();
  showToast('タスクを追加しました');
};

// ─── DATE NAV ────────────────────────────────────────────
document.getElementById('prev-day-btn').onclick = () => {
  selectedDate = addDays(selectedDate, -1);
  renderHeader(); renderToday();
};
document.getElementById('next-day-btn').onclick = () => {
  const next = addDays(selectedDate, 1);
  if (next > isoToday()) { showToast('未来の日付には記録できません'); return; }
  selectedDate = next;
  renderHeader(); renderToday();
};

// ─── TAB SWITCHING ───────────────────────────────────────
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${tab}`).classList.add('active');
    currentTab = tab;
    if (tab === 'progress') renderProgress();
    if (tab === 'all') renderAll();
  });
});

// ─── SAMPLE DATA (first load) ────────────────────────────
if (!tasks.length) {
  const today = isoToday();
  tasks = [
    { id: uid(), name: 'SPI勉強',  startDate: today, endDate: addDays(today, 22), goalValue: 20, goalUnit: '問' },
    { id: uid(), name: 'TOEIC対策', startDate: addDays(today, 23), endDate: addDays(today, 69), goalValue: 1,  goalUnit: '時間' },
  ];
  saveTasks();
}

// ─── INIT ────────────────────────────────────────────────
renderHeader();
renderToday();
</script>
</body>
</html>
